spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ktvdb}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
#springdoc.api-docs.enabled=false
#springdoc.swagger-ui.enabled=false
#springdoc.packages-to-scan=org.example.controller
springdoc.swagger-ui.path=/swagger-ui
#springdoc.swagger-ui.operationsSorter=method
#springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
app.upload-dir=${APP_UPLOAD_DIR:uploads}
app.promotion-import-dir=${APP_PROMOTION_IMPORT_DIR:imports/promotions}
app.promotion-import-initial-delay-ms=${APP_PROMOTION_IMPORT_INITIAL_DELAY_MS:10000}
app.promotion-import-fixed-delay-ms=${APP_PROMOTION_IMPORT_FIXED_DELAY_MS:30000}
app.jwt.private-key=${JWT_PRIVATE_KEY:}
app.jwt.public-key=${JWT_PUBLIC_KEY:}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:1800000}
app.jwt.issuer=${JWT_ISSUER:ktv-airline}
app.jwt.key-id=${JWT_KEY_ID:ktv-airline-rs256}
app.jwt.kid-key-command-template=${JWT_KID_KEY_COMMAND_TEMPLATE:cat ./jwt-{kid}.pem}
app.public-backend-url=${APP_PUBLIC_BACKEND_URL:http://localhost:8081}
app.legacy-upload-webroot.enabled=${APP_LEGACY_UPLOAD_WEBROOT_ENABLED:true}
app.legacy-upload-webroot.path=${APP_LEGACY_UPLOAD_WEBROOT_PATH:/uploads}
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:5MB}
server.tomcat.basedir=${SERVER_TOMCAT_BASEDIR:.}
server.tomcat.accesslog.enabled=${SERVER_TOMCAT_ACCESSLOG_ENABLED:true}
server.tomcat.accesslog.directory=${SERVER_TOMCAT_ACCESSLOG_DIRECTORY:logs}
server.tomcat.accesslog.prefix=${SERVER_TOMCAT_ACCESSLOG_PREFIX:access}
server.tomcat.accesslog.suffix=${SERVER_TOMCAT_ACCESSLOG_SUFFIX:.log}
server.tomcat.accesslog.file-date-format=${SERVER_TOMCAT_ACCESSLOG_FILE_DATE_FORMAT:}
server.tomcat.accesslog.pattern=${SERVER_TOMCAT_ACCESSLOG_PATTERN:combined}
# LOG POISONING SOURCE: the combined access log can store attacker-controlled
# request data in a file that the vulnerable theme loader can later read.
#
# FIXED CONFIG:
#
# server.tomcat.accesslog.enabled=false
#
# If access logs are required, keep them outside any app-readable theme/upload
# path and avoid logging attacker-controlled query strings/headers:
# server.tomcat.accesslog.directory=/var/log/ktv-airline
# server.tomcat.accesslog.pattern=%h %l %u %t "%m %U %H" %s %b
app.dynamic-ui-component-dir=${APP_DYNAMIC_UI_COMPONENT_DIR:templates/components}
app.profile-theme-custom-dir=${APP_PROFILE_THEME_CUSTOM_DIR:data/custom_themes}
spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.suffix=.ftl
spring.freemarker.cache=false
