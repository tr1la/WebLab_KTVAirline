name: ktv-airline-dev

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ktvdb}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev.backend
    image: ktv-airline-dev-backend
    working_dir: /app
    command: sh .docker/dev-backend.sh
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ktvdb}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-lampestdoo@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-lampestdoo@gmail.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-KTVAirline}
      APP_UPLOAD_DIR: ${APP_UPLOAD_DIR:-/app/uploads}
      APP_PROMOTION_IMPORT_DIR: ${APP_PROMOTION_IMPORT_DIR:-/app/imports/promotions}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-1800000}
      JWT_ISSUER: ${JWT_ISSUER:-ktv-airline}
      JWT_KEY_ID: ${JWT_KEY_ID:-ktv-airline-rs256}
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
      - "${BACKEND_DEBUG_PORT:-5005}:5005"
    volumes:
      - ./pom.xml:/app/pom.xml
      - ./src:/app/src
      - ./.docker:/app/.docker:ro
      - ./uploads:/app/uploads
      - ./imports:/app/imports
      - ./data:/app/data
      - ./logs:/app/logs
      - ./templates:/app/templates
      - maven-cache:/root/.m2
      - backend-target:/app/target

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    restart: unless-stopped
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_DEV_PROXY_TARGET: http://backend:8080
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:5173"
    volumes:
      - ./frontend:/app
      - ./src/main/resources/templates:/app/backend-templates:ro
      - frontend-node-modules:/app/node_modules

volumes:
  mysql-data:
  maven-cache:
  backend-target:
  frontend-node-modules:
